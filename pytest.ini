[pytest]
markers =
    caso1: Caso 1 - diferencas de grafia
    caso2: Caso 2 - sobrenome + iniciais dos nomes
    caso3: Caso 3 - 'de' e ponto opcional
    caso4: Caso 4 - iniciais agrupadas + sobrenome
    caso5: Caso 5 - ids diferentes
    excecao: Testes de excecao
    parametrizado: Testes parametrizados
addopts = -v --strict-markers
testpaths = tests
